<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>GreenKeeper</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/vue@3"></script>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

</head>
<body>
<div id="app" class="container d-flex flex-column align-items-center">
    <!-- przycisk "cofnij" -->
    <div v-if="currentView === 'reset' || currentView === 'register'" class="w-100 mt-3" style="max-width: 400px;">
        <button class="btn btn-light rounded-circle shadow-sm" style="width: 40px; height: 40px;" @click="currentView = 'login'">
            <i class="bi bi-arrow-left"></i>
        </button>
    </div>

    <h1 class="app-title">GreenKeeper</h1>
    <p class="app-subtitle">Keep your plants alive</p>

    <!-- ekran logowania -->
    <div v-if="currentView === 'login'" class="w-100 d-flex flex-column align-items-center">
        <div class="login-card w-100" style="max-width: 400px;">
            <div class="mb-3">
                <label class="form-label text-muted small fw-bold">Email</label>
                <input type="email" class="form-control" v-model="email" placeholder="example@xyz.com">
            </div>
            <div class="mb-3">
                <label class="form-label text-muted small fw-bold">Hasło</label>
                <input type="password" class="form-control" v-model="password" placeholder="*******">
            </div>

            <button class="btn btn-dark w-100 mb-3" @click="loginWithEmail">Zaloguj</button>

            <div class="d-flex justify-content-between small fw-bold">
                <a href="#" class="text-dark text-decoration-none border-bottom border-dark" @click.prevent="currentView = 'reset'">Zapomniałeś hasła?</a>
                <a href="#" class="text-dark text-decoration-none border-bottom border-dark" @click.prevent="currentView = 'register'">Zarejestruj się</a>
            </div>
        </div>

        <div class="w-100" style="max-width: 400px;">
            <button class="gsi-material-button" @click="loginWithGoogle">
                <div class="gsi-material-button-state"></div>
                <div class="gsi-material-button-content-wrapper">
                    <div class="gsi-material-button-icon">
                        <svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" xmlns:xlink="http://www.w3.org/1999/xlink" style="display: block;">
                            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"></path>
                            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"></path>
                            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"></path>
                            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"></path>
                            <path fill="none" d="M0 0h48v48H0z"></path>
                        </svg>
                    </div>
                    <span class="gsi-material-button-contents">Zaloguj się przez Google</span>
                    <span style="display: none;">Zaloguj się przez Google</span>
                </div>
            </button>
        </div>
    </div>

    <!-- ekran resetu hasła -->
    <div v-else-if="currentView === 'reset'" class="w-100 d-flex flex-column align-items-center">
        <div class="login-card w-100" style="max-width: 400px;">
            <p class="text-center fw-bold mb-4">Podaj adres e-mail, na który zarejestrowane jest Twoje konto.</p>

            <div class="mb-4">
                <label class="form-label text-muted small fw-bold">Email</label>
                <input type="email" class="form-control" v-model="email" placeholder="example@xyz.com">
            </div>

            <button class="btn btn-dark w-100" @click="resetPassword">Resetuj hasło</button>
        </div>
    </div>

    <!-- ekran rejestracji użytkownika -->
    <div v-else-if="currentView === 'register'" class="w-100 d-flex flex-column align-items-center">
        <div class="login-card w-100" style="max-width: 400px;">

            <div class="mb-3">
                <label class="form-label text-muted small fw-bold">Email</label>
                <input type="email" class="form-control"
                       :class="{'is-valid': isEmailValid, 'is-invalid': registerEmail.length > 0 && !isEmailValid}"
                       v-model="registerEmail"
                       placeholder="example@xyz.com">
            </div>

            <div class="mb-3 position-relative">
                <label class="form-label text-muted small fw-bold">Hasło</label>
                <input type="password" class="form-control"
                       :class="{'is-valid': isPasswordValid, 'is-invalid': registerPassword.length > 0 && !isPasswordValid}"
                       v-model="registerPassword"
                       @focus="isPasswordFocused = true"
                       @blur="isPasswordFocused = false"
                       placeholder="co najmniej 8 znaków">

                <div v-if="isPasswordFocused || (registerPassword.length > 0 && !isPasswordValid)"
                     class="p-2 mt-1 rounded bg-light border shadow-sm" style="font-size: 0.8rem; z-index: 10;">
                    <div class="fw-bold mb-1">Hasło musi zawierać (minimum):</div>
                    <div :class="hasMinLength ? 'text-success' : 'text-danger'">
                        <i :class="hasMinLength ? 'bi bi-check-circle-fill' : 'bi bi-x-circle-fill'"></i> 8 znaków
                    </div>
                    <div :class="hasUpperCase ? 'text-success' : 'text-danger'">
                        <i :class="hasUpperCase ? 'bi bi-check-circle-fill' : 'bi bi-x-circle-fill'"></i> 1 wielką literę
                    </div>
                    <div :class="hasNumber ? 'text-success' : 'text-danger'">
                        <i :class="hasNumber ? 'bi bi-check-circle-fill' : 'bi bi-x-circle-fill'"></i> 1 cyfrę
                    </div>
                    <div :class="hasSpecialChar ? 'text-success' : 'text-danger'">
                        <i :class="hasSpecialChar ? 'bi bi-check-circle-fill' : 'bi bi-x-circle-fill'"></i> 1 znak specjalny (dozwolone !@#$%^&*)
                    </div>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label text-muted small fw-bold">Potwierdź hasło</label>
                <input type="password" class="form-control"
                       :class="{'is-valid': isPasswordMatching}"
                       v-model="registerConfirmPassword"
                       placeholder="hasła muszą się zgadzać">
            </div>

            <button class="btn btn-dark w-100" @click="registerAccount" :disabled="!isFormReadyToSubmit">Zarejestruj</button>
        </div>
    </div>

</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword,
        signInWithEmailAndPassword,
        GoogleAuthProvider,
        signInWithPopup,
        sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
    import { getFirestore } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCtTi9B_JUl8hv7sYJUsoVH1u3Lw63gvGk",
        authDomain: "greenkeeper-e380b.firebaseapp.com",
        projectId: "greenkeeper-e380b",
        storageBucket: "greenkeeper-e380b.firebasestorage.app",
        messagingSenderId: "37026643235",
        appId: "1:37026643235:web:12844073915f16a3042096",
        measurementId: "G-97XLV0MS04"
    };

    const app = initializeApp(firebaseConfig);

    window.firebaseAuth = getAuth(app);
    window.firebaseDb = getFirestore(app);
    window.firebaseAuthMethods = {
        createUserWithEmailAndPassword,
        signInWithEmailAndPassword,
        GoogleAuthProvider,
        signInWithPopup,
        sendPasswordResetEmail
    };
</script>

<script>
    Vue.createApp({
        data() {
            return {
                // logowanie
                currentView: 'login',
                email: '',
                password: '',

                //rejestracja
                registerEmail: '',
                registerPassword: '',
                registerConfirmPassword: '',
                isPasswordFocused: false
            }
        },
        computed: {
            isEmailValid() {
                return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(this.registerEmail);
            },
            hasMinLength() {
                return this.registerPassword.length >= 8;
            },
            hasUpperCase() {
                return /[A-Z]/.test(this.registerPassword);
            },
            hasNumber() {
                return /[0-9]/.test(this.registerPassword);
            },
            hasSpecialChar() {
                return /[!@#$%^&*]/.test(this.registerPassword);
            },
            isPasswordValid() {
              return this.hasMinLength && this.hasUpperCase && this.hasNumber && this.hasSpecialChar;
          },
            isPasswordMatching() {
                return this.isPasswordValid && (this.registerPassword === this.registerConfirmPassword) && this.registerPassword !== '';
            },
            isFormReadyToSubmit() {
                return this.isPasswordMatching && this.isEmailValid;
            }
        },
        methods: {
            async loginWithEmail() {
                try {
                    await window.firebaseAuthMethods.signInWithEmailAndPassword(window.firebaseAuth, this.email, this.password);
                    alert("Zalogowano pomyślnie! Witaj " + this.email);
                } catch (error) {
                    alert("Błąd logowania: Nieprawidłowy e-mail lub hasło.");
                    console.error(error);
                }
            },
            async loginWithGoogle() {
                try {
                    const provider = new window.firebaseAuthMethods.GoogleAuthProvider();
                    const result = await window.firebaseAuthMethods.signInWithPopup(window.firebaseAuth, provider);
                    alert("Zalogowano przez Google! Witaj " + result.user.email);
                } catch (error) {
                    alert("Logowanie Google przerwane lub wystąpił błąd.");
                    console.error(error);
                }
            },
            async resetPassword() {
                try {
                    await window.firebaseAuthMethods.sendPasswordResetEmail(window.firebaseAuth, this.email);
                    alert("Link do resetu hasła został wysłany na podany adres e-mail (jeśli istnieje w bazie).");
                    this.currentView = 'login';
                } catch (error) {
                    alert("Błąd: Sprawdź, czy wpisałeś poprawny e-mail.");
                    console.error(error);
                }
            },
            async registerAccount() {
                if(this.isFormReadyToSubmit) {
                    try {
                        const userCredential = await window.firebaseAuthMethods.createUserWithEmailAndPassword(window.firebaseAuth, this.registerEmail, this.registerPassword);

                        alert("Konto zostało pomyślnie utworzone!\nEmail: " + userCredential.user.email);
                        
                        this.registerEmail = '';
                        this.registerPassword = '';
                        this.registerConfirmPassword = '';
                        this.currentView = 'login';
                    } catch (error) {
                        if(error.code === 'auth/email-already-in-use') {
                            alert("Błąd: Ten adres e-mail jest już zajęty.");
                        } else {
                            alert("Wystąpił błąd podczas rejestracji: " + error.message);
                        }
                        console.error(error);
                    }
                }
            }
        }
    }).mount('#app')
</script>

</body>
</html>
